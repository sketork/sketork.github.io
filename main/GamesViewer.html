<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Roblox OSINT Terminal</title>
    <style>
        :root {
            --bg-color: #0d1117;
            --panel-bg: #161b22;
            --border-color: #30363d;
            --text-color: #c9d1d9;
            --accent: #58a6ff;
            --accent-hover: #79c0ff;
            --danger: #f85149;
            --success: #3fb950;
            --warning: #d29922;
            --font-mono: 'Courier New', Courier, monospace;
        }
        
        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: var(--font-mono);
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
        }

        .container {
            max-width: 900px;
            width: 100%;
        }

        h1, h2, h3, h4 {
            color: var(--accent);
            margin-top: 0;
            font-weight: normal;
        }

        .header-title {
            text-align: center;
            border-bottom: 1px dashed var(--border-color);
            padding-bottom: 20px;
            margin-bottom: 20px;
            letter-spacing: 2px;
        }

        .search-box {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }

        .search-box input {
            flex: 1;
            padding: 12px;
            background: var(--panel-bg);
            border: 1px solid var(--border-color);
            color: var(--text-color);
            font-size: 16px;
            font-family: var(--font-mono);
            outline: none;
            transition: border-color 0.2s;
        }

        .search-box input:focus {
            border-color: var(--accent);
        }

        .search-box button {
            padding: 12px 24px;
            background: rgba(88, 166, 255, 0.1);
            color: var(--accent);
            border: 1px solid var(--accent);
            cursor: pointer;
            font-size: 16px;
            font-family: var(--font-mono);
            font-weight: bold;
            transition: all 0.2s;
        }

        .search-box button:hover {
            background: var(--accent);
            color: var(--bg-color);
        }

        .profile-container {
            background: var(--panel-bg);
            border: 1px solid var(--border-color);
            padding: 20px;
            border-radius: 4px;
            margin-bottom: 20px;
        }

        .profile-header {
            display: flex;
            gap: 20px;
            flex-wrap: wrap;
        }

        .avatar {
            width: 150px;
            height: 150px;
            border: 1px solid var(--border-color);
            border-radius: 4px;
            background: var(--bg-color);
            object-fit: cover;
        }

        .profile-info {
            flex: 1;
            min-width: 250px;
        }

        .profile-info p {
            margin: 8px 0;
            line-height: 1.4;
            font-size: 14px;
        }

        .games-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 15px;
            margin-bottom: 30px;
        }

        .game-card {
            background: var(--panel-bg);
            border: 1px solid var(--border-color);
            padding: 15px;
            border-radius: 4px;
            cursor: pointer;
            transition: transform 0.2s, border-color 0.2s;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }

        .game-card:hover {
            transform: translateY(-3px);
            border-color: var(--accent);
            box-shadow: 0 4px 12px rgba(88, 166, 255, 0.1);
        }

        .game-card h3 {
            font-size: 15px;
            margin-bottom: 10px;
            word-break: break-word;
        }

        .game-card p {
            margin: 5px 0;
            font-size: 13px;
            color: #8b949e;
        }

        .monetize-btn, .link-btn {
            margin-top: 15px;
            padding: 8px;
            font-family: var(--font-mono);
            font-size: 12px;
            text-transform: uppercase;
            width: 100%;
            cursor: pointer;
            transition: all 0.2s;
        }

        .monetize-btn {
            background: rgba(210, 153, 34, 0.1);
            color: var(--warning);
            border: 1px solid var(--warning);
        }

        .monetize-btn:hover {
            background: var(--warning);
            color: var(--bg-color);
        }

        .link-btn {
            background: rgba(88, 166, 255, 0.1);
            color: var(--accent);
            border: 1px solid var(--accent);
        }

        .link-btn:hover {
            background: var(--accent);
            color: var(--bg-color);
        }

        .hidden { display: none !important; }

        /* Modal Styles */
        .modal {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(13, 17, 23, 0.85);
            backdrop-filter: blur(3px);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }

        .modal-content {
            background: var(--panel-bg);
            border: 1px solid var(--accent);
            padding: 30px;
            width: 90%;
            max-width: 750px;
            max-height: 85vh;
            overflow-y: auto;
            border-radius: 4px;
            position: relative;
            box-shadow: 0 0 30px rgba(88, 166, 255, 0.15);
        }

        .close {
            position: absolute;
            top: 15px;
            right: 20px;
            color: var(--text-color);
            font-size: 28px;
            cursor: pointer;
            line-height: 1;
        }

        .close:hover { color: var(--danger); }

        .modal-images {
            display: flex;
            gap: 20px;
            margin-bottom: 20px;
            align-items: center;
            background: var(--bg-color);
            padding: 15px;
            border: 1px solid var(--border-color);
            border-radius: 4px;
        }

        .game-icon {
            width: 120px;
            height: 120px;
            border-radius: 12px;
            border: 1px solid var(--border-color);
            object-fit: cover;
            box-shadow: 0 4px 10px rgba(0,0,0,0.5);
        }

        .game-thumbnail {
            flex: 1;
            height: 120px;
            border-radius: 8px;
            border: 1px solid var(--border-color);
            object-fit: cover;
            box-shadow: 0 4px 10px rgba(0,0,0,0.5);
        }

        .insight-grid, .monetize-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
            gap: 15px;
            margin-top: 20px;
            margin-bottom: 30px;
        }

        .insight-box, .monetize-item {
            background: var(--bg-color);
            border: 1px solid var(--border-color);
            padding: 15px;
            text-align: center;
            border-radius: 4px;
        }

        .monetize-item {
            border-color: rgba(210, 153, 34, 0.3);
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }

        .insight-box h4, .monetize-item h4 {
            font-size: 11px;
            color: #8b949e;
            margin-bottom: 8px;
            text-transform: uppercase;
            letter-spacing: 1px;
            word-break: break-word;
        }

        .insight-box .value {
            font-size: 18px;
            font-weight: bold;
            margin: 0;
            color: var(--text-color);
        }

        .robux-price {
            color: var(--success);
            font-weight: bold;
            font-size: 16px;
            margin-top: 10px;
        }
        
        .robux-price::before {
            content: "R$ ";
        }

        .insight-footer {
            margin-top: 25px;
            font-size: 13px;
            color: #8b949e;
            border-top: 1px dashed var(--border-color);
            padding-top: 15px;
        }

        #loading {
            color: var(--accent);
            font-style: italic;
            margin-bottom: 20px;
            text-align: center;
        }

        #loading::after {
            content: "///";
            animation: blink 1s linear infinite;
        }

        @keyframes blink {
            0%, 100% { opacity: 1; }
            50% { opacity: 0; }
        }

        .error {
            color: var(--danger);
            background: rgba(248, 81, 73, 0.1);
            padding: 15px;
            border: 1px solid var(--danger);
            border-radius: 4px;
            margin-bottom: 20px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1 class="header-title">[ ROBLOX OSINT TERMINAL ]</h1>
        
        <div class="search-box">
            <input type="text" id="searchInput" placeholder="Enter Target Username or UserID..." autocomplete="off">
            <button onclick="executeSearch()">INITIATE SCAN</button>
        </div>
        
        <div id="loading" class="hidden">Intercepting data packets</div>
        <div id="error" class="hidden error"></div>
        
        <div id="profile" class="hidden profile-container">
            <!-- Profile populated via JS -->
        </div>

        <div id="groupsSection" class="hidden">
            <h2>> Discovered Owned Groups</h2>
            <div id="groupsList" class="games-grid"></div>
        </div>

        <div id="gamesSection" class="hidden">
            <h2>> Discovered Experiences</h2>
            <div id="gamesList" class="games-grid"></div>
        </div>
    </div>

    <!-- General Insights Modal -->
    <div id="gameModal" class="modal hidden">
        <div class="modal-content">
            <span class="close" onclick="closeModal('gameModal')">&times;</span>
            <h2 id="modalGameTitle">Target Details</h2>
            <div id="modalGameContent"></div>
        </div>
    </div>

    <!-- Monetization Modal -->
    <div id="monetizeModal" class="modal hidden">
        <div class="modal-content" style="border-color: var(--warning);">
            <span class="close" onclick="closeModal('monetizeModal')">&times;</span>
            <h2 id="modalMonetizeTitle" style="color: var(--warning);">Monetization Data</h2>
            <div id="modalMonetizeContent"></div>
        </div>
    </div>

    <script>
        const $ = id => document.getElementById(id);
        const setVisible = (id, isVisible) => $(id).classList.toggle('hidden', !isVisible);

        // Smart multi-proxy fallback chain
        async function rbxFetch(domain, path, options = {}) {
            const rawUrl = `https://${domain}.roblox.com${path}`;
            const encodedUrl = encodeURIComponent(rawUrl);
            const method = options.method || 'GET';
            
            let proxies = [
                `https://${domain}.roproxy.com${path}`,
                `https://corsproxy.io/?${encodedUrl}`
            ];

            if (method === 'GET') {
                proxies.push(`https://api.allorigins.win/raw?url=${encodedUrl}`);
                proxies.push(`https://api.codetabs.com/v1/proxy?quest=${encodedUrl}`);
            }

            for (let i = 0; i < proxies.length; i++) {
                const proxy = proxies[i];
                try {
                    const res = await fetch(proxy, options);
                    if (res.status === 429) continue;
                    if (!res.ok) throw new Error(`HTTP ${res.status}`);
                    return await res.json();
                } catch (error) {
                    if (i === proxies.length - 1) {
                        if (method === 'POST') throw new Error("Target not found, or POST proxies blocked.");
                        else throw new Error("Network Error: All proxy nodes failed.");
                    }
                }
            }
        }

        async function fetchAllGames(domain, basePath, maxPages = 4) {
            let allData = [];
            let cursor = "";
            let pages = 0;
            do {
                const separator = basePath.includes("?") ? "&" : "?";
                const url = `${basePath}${separator}limit=50${cursor ? `&cursor=${cursor}` : ""}`;
                const res = await rbxFetch(domain, url);
                if (res.data) allData = allData.concat(res.data);
                cursor = res.nextPageCursor;
                pages++;
            } while (cursor && pages < maxPages);
            return allData;
        }

        $('searchInput').addEventListener('keypress', e => {
            if (e.key === 'Enter') executeSearch();
        });

        async function executeSearch() {
            const input = $('searchInput').value.trim();
            if (!input) return;

            setVisible('loading', true);
            setVisible('error', false);
            setVisible('profile', false);
            setVisible('groupsSection', false);
            setVisible('gamesSection', false);

            try {
                let userId = parseInt(input);
                
                if (isNaN(userId)) {
                    const userRes = await rbxFetch('users', '/v1/usernames/users', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ usernames: [input], excludeBannedUsers: false })
                    });
                    if (userRes.data && userRes.data.length > 0) userId = userRes.data[0].id;
                    else throw new Error("Target not found in Roblox database.");
                }

                // Parallel Fetch for Base Profile Data AND Groups
                const [profile, avatarRes, historyRes, groupsRes] = await Promise.all([
                    rbxFetch('users', `/v1/users/${userId}`),
                    rbxFetch('thumbnails', `/v1/users/avatar?userIds=${userId}&size=150x150&format=Png&isCircular=false`),
                    rbxFetch('users', `/v1/users/${userId}/username-history?limit=50`).catch(() => ({ data: [] })),
                    rbxFetch('groups', `/v1/users/${userId}/groups/roles`).catch(() => ({ data: [] }))
                ]);

                const avatarUrl = avatarRes.data?.[0]?.imageUrl || '';
                const pastNames = historyRes.data?.map(x => x.name) || [];

                // Filter for Owned Groups (Rank 255)
                const ownedGroups = (groupsRes.data || []).filter(g => g.role && g.role.rank === 255);
                const totalMembers = ownedGroups.reduce((sum, g) => sum + (g.group.memberCount || 0), 0);

                // Render Profile with Placeholder for Visits
                renderProfile(profile, avatarUrl, pastNames, totalMembers);

                // Fetch Games (Personal + Groups)
                let allGames = [];
                try {
                    const personalGames = await fetchAllGames('games', `/v2/users/${userId}/games`);
                    personalGames.forEach(g => allGames.push({...g, ownerContext: 'Personal Profile'}));
                } catch(e) { console.warn("Could not fetch personal games"); }

                for (const grp of ownedGroups) {
                    try {
                        const groupGames = await fetchAllGames('games', `/v2/groups/${grp.group.id}/games`);
                        groupGames.forEach(g => allGames.push({...g, ownerContext: `Group: ${grp.group.name}`}));
                    } catch(err) { console.warn(`Failed to fetch games for group ${grp.group.name}`); }
                }

                // Calculate Total Visits & Update Profile Stat Live
                const totalVisits = allGames.reduce((sum, g) => sum + (g.placeVisits || 0), 0);
                const statVisitsEl = $('statVisits');
                if (statVisitsEl) statVisitsEl.innerText = totalVisits.toLocaleString();

                renderGroupsList(ownedGroups);
                renderGamesList(allGames);

            } catch (err) {
                $('error').innerText = `[ERROR]: ${err.message}`;
                setVisible('error', true);
            } finally {
                setVisible('loading', false);
            }
        }

        function renderProfile(profile, avatarUrl, pastNames, totalMembers) {
            setVisible('profile', true);
            const banStatus = profile.isBanned 
                ? '<span style="color:var(--danger); font-weight:bold;">[ TERMINATED/BANNED ]</span>' 
                : '<span style="color:var(--success); font-weight:bold;">[ ACTIVE ]</span>';
            
            const createdDate = new Date(profile.created);
            const ageDays = Math.floor((new Date() - createdDate) / (1000 * 60 * 60 * 24));
            
            $('profile').innerHTML = `
                <div class="profile-header">
                    <img src="${avatarUrl}" alt="Avatar" class="avatar">
                    <div class="profile-info">
                        <h2>${profile.displayName} (@${profile.name}) ${banStatus}</h2>
                        <p><strong>Database ID:</strong> ${profile.id}</p>
                        <p><strong>Account Creation:</strong> ${createdDate.toLocaleDateString()} (${ageDays.toLocaleString()} days ago)</p>
                        <p><strong>Total Owned Group Members:</strong> <span style="color:var(--success); font-weight:bold;">${totalMembers.toLocaleString()}</span></p>
                        <p><strong>Total Owned Experience Visits:</strong> <span id="statVisits" style="color:var(--accent); font-weight:bold; font-style:italic;">Scanning...</span></p>
                        <p><strong>Known Aliases:</strong> ${pastNames.length > 0 ? pastNames.join(', ') : '<i>None logged</i>'}</p>
                        <p><strong>Bio:</strong><br> ${profile.description ? profile.description.replace(/\\n/g, '<br>') : '<i>No data provided.</i>'}</p>
                    </div>
                </div>
            `;
        }

        function renderGroupsList(groups) {
            setVisible('groupsSection', true);
            const list = $('groupsList');
            list.innerHTML = '';

            if (groups.length === 0) {
                list.innerHTML = '<p style="color:#8b949e;">No owned groups discovered for this target.</p>';
                return;
            }

            groups.sort((a, b) => (b.group.memberCount || 0) - (a.group.memberCount || 0));

            groups.forEach(g => {
                const card = document.createElement('div');
                card.className = 'game-card';
                card.innerHTML = `
                    <div>
                        <h3>> ${g.group.name}</h3>
                        <p><strong>Group ID:</strong> ${g.group.id}</p>
                        <p><strong>Members:</strong> ${(g.group.memberCount || 0).toLocaleString()}</p>
                        <p><strong>Rank Status:</strong> Owner (${g.role.name})</p>
                    </div>
                    <button class="link-btn" onclick="window.open('https://www.roblox.com/groups/${g.group.id}', '_blank')">
                        [🔗] View on Roblox
                    </button>
                `;
                list.appendChild(card);
            });
        }

        function renderGamesList(games) {
            setVisible('gamesSection', true);
            const list = $('gamesList');
            list.innerHTML = '';

            if (games.length === 0) {
                list.innerHTML = '<p style="color:#8b949e;">No connected experiences found for this target.</p>';
                return;
            }

            games.sort((a, b) => (b.placeVisits || 0) - (a.placeVisits || 0));

            games.forEach(g => {
                const card = document.createElement('div');
                card.className = 'game-card';
                
                card.onclick = () => openInsights(g.id); 

                card.innerHTML = `
                    <div>
                        <h3>> ${g.name || 'Unnamed Place'}</h3>
                        <p><strong>Context:</strong> ${g.ownerContext}</p>
                        <p><strong>Total Visits:</strong> ${(g.placeVisits || 0).toLocaleString()}</p>
                    </div>
                    <button class="monetize-btn">[$] View Monetization</button>
                `;
                
                const monetizeBtn = card.querySelector('.monetize-btn');
                monetizeBtn.onclick = (event) => {
                    openMonetization(event, g.id, g.name || 'Unnamed Place');
                };

                list.appendChild(card);
            });
        }

        async function openMonetization(event, universeId, gameName) {
            event.stopPropagation();
            
            setVisible('monetizeModal', true);
            const title = $('modalMonetizeTitle');
            const content = $('modalMonetizeContent');
            
            title.innerText = `[ SCANNING FINANCES: ${gameName} ]`;
            content.innerHTML = '<p style="color:var(--warning);">Extracting Gamepasses...</p>';

            try {
                const [passesRes, devProductsRes] = await Promise.all([
                    rbxFetch('apis', `/game-passes/v1/universes/${universeId}/game-passes`).catch(() => ({})),
                    rbxFetch('apis', `/developer-products/v2/universes/${universeId}/developerproducts?limit=100`).catch(() => ({}))
                ]);

                const rawPasses = passesRes.gamePasses || passesRes.GamePasses || [];
                const products = devProductsRes.developerProducts || devProductsRes.DeveloperProducts || [];

                content.innerHTML = '<p style="color:var(--warning);">Decrypting Gamepass Pricing Data...</p>';

                const passesWithPrices = await Promise.all(rawPasses.map(async (p) => {
                    const passId = p.id || p.Id;
                    try {
                        const info = await rbxFetch('apis', `/game-passes/v1/game-passes/${passId}/product-info`);
                        return { ...p, detailedInfo: info };
                    } catch(e) { return { ...p, detailedInfo: null }; }
                }));

                let htmlContent = '';

                htmlContent += `<h3 style="color: var(--accent); border-bottom: 1px solid var(--border-color); padding-bottom: 5px;">> Gamepasses (${passesWithPrices.length})</h3>`;
                if (passesWithPrices.length > 0) {
                    htmlContent += '<div class="monetize-grid">';
                    passesWithPrices.forEach(p => {
                        let price = 'Off Sale';
                        const info = p.detailedInfo;
                        if (info) {
                            if (info.priceInformation && info.priceInformation.defaultPriceInRobux !== null) {
                                price = info.priceInformation.defaultPriceInRobux;
                            } else if (info.PriceInRobux !== undefined && info.PriceInRobux !== null) {
                                price = info.PriceInRobux;
                            }
                        }
                        const passName = p.name || p.Name || 'Unnamed Gamepass';
                        htmlContent += `
                            <div class="monetize-item">
                                <h4>${passName}</h4>
                                <div class="robux-price">${price}</div>
                            </div>
                        `;
                    });
                    htmlContent += '</div>';
                } else {
                    htmlContent += '<p style="color: #8b949e; margin-bottom: 30px;">No Gamepasses detected.</p>';
                }

                htmlContent += `<h3 style="color: var(--accent); border-bottom: 1px solid var(--border-color); padding-bottom: 5px;">> Developer Products (${products.length})</h3>`;
                if (products.length > 0) {
                    htmlContent += '<div class="monetize-grid">';
                    products.forEach(p => {
                        const productName = p.displayName || p.Name || p.name || 'Unnamed Product';
                        const price = p.PriceInRobux || p.priceInRobux || 0;
                        htmlContent += `
                            <div class="monetize-item">
                                <h4>${productName}</h4>
                                <div class="robux-price">${price}</div>
                            </div>
                        `;
                    });
                    htmlContent += '</div>';
                } else {
                    htmlContent += '<p style="color: #8b949e;">No Developer Products detected.</p>';
                }

                content.innerHTML = htmlContent;

            } catch (err) {
                content.innerHTML = `<p class="error">Failed to extract monetization data: ${err.message}</p>`;
            }
        }

        async function openInsights(universeId) {
            setVisible('gameModal', true);
            const title = $('modalGameTitle');
            const content = $('modalGameContent');
            
            title.innerText = "Extracting live telemetry...";
            content.innerHTML = '<p style="color:var(--accent);">Querying master servers...</p>';

            try {
                const [infoRes, votesRes, iconRes, thumbRes] = await Promise.all([
                    rbxFetch('games', `/v1/games?universeIds=${universeId}`),
                    rbxFetch('games', `/v1/games/votes?universeIds=${universeId}`).catch(() => null),
                    rbxFetch('thumbnails', `/v1/games/icons?universeIds=${universeId}&size=150x150&format=Png&isCircular=false`).catch(() => null),
                    rbxFetch('thumbnails', `/v1/games/multiget/thumbnails?universeIds=${universeId}&size=768x432&format=Png&isCircular=false`).catch(() => null)
                ]);

                const game = infoRes.data?.[0];
                if (!game) throw new Error("Could not extract experience telemetry.");

                const votes = votesRes?.data?.[0];
                let upvotes = votes?.upVotes || 0;
                let downvotes = votes?.downVotes || 0;
                let ratio = (upvotes + downvotes > 0) ? Math.round((upvotes / (upvotes + downvotes)) * 100) : 0;

                const iconUrl = iconRes?.data?.[0]?.imageUrl || 'https://tr.rbxcdn.com/180DAY-1104aaa4ec1b610e9b576ab9dc0b924a/420/420/Decal/Webp/noFilter';
                const thumbData = thumbRes?.data?.[0]?.thumbnails?.[0]; 
                const thumbUrl = thumbData?.imageUrl || 'https://tr.rbxcdn.com/180DAY-1104aaa4ec1b610e9b576ab9dc0b924a/420/420/Decal/Webp/noFilter';

                title.innerText = `[ INSIGHTS: ${game.name} ]`;

                content.innerHTML = `
                    <div class="modal-images">
                        <img src="${iconUrl}" alt="Game Icon" class="game-icon">
                        <img src="${thumbUrl}" alt="Game Thumbnail" class="game-thumbnail">
                    </div>
                    <div class="insight-grid">
                        <div class="insight-box">
                            <h4>Active CCU</h4>
                            <p class="value" style="color:var(--success);">${(game.playing || 0).toLocaleString()}</p>
                        </div>
                        <div class="insight-box">
                            <h4>Total Visits</h4>
                            <p class="value">${(game.visits || 0).toLocaleString()}</p>
                        </div>
                        <div class="insight-box">
                            <h4>Favorites</h4>
                            <p class="value">${(game.favoritedCount || 0).toLocaleString()}</p>
                        </div>
                        <div class="insight-box">
                            <h4>Max Server Size</h4>
                            <p class="value">${game.maxPlayers || 'Unknown'}</p>
                        </div>
                        <div class="insight-box">
                            <h4>Upvotes</h4>
                            <p class="value" style="color:var(--success);">${upvotes.toLocaleString()}</p>
                        </div>
                        <div class="insight-box">
                            <h4>Downvotes</h4>
                            <p class="value" style="color:var(--danger);">${downvotes.toLocaleString()}</p>
                        </div>
                        <div class="insight-box">
                            <h4>Approval Ratio</h4>
                            <p class="value">${ratio}%</p>
                        </div>
                        <div class="insight-box">
                            <h4>Root Place ID</h4>
                            <p class="value">${game.rootPlaceId || 'N/A'}</p>
                        </div>
                    </div>
                    <div class="insight-footer">
                        <p style="margin: 5px 0;"><strong>Creation Date:</strong> ${new Date(game.created).toLocaleString()}</p>
                        <p style="margin: 5px 0;"><strong>Last Update:</strong> ${new Date(game.updated).toLocaleString()}</p>
                    </div>
                `;
            } catch (err) {
                title.innerText = "Telemetry Extraction Failed";
                content.innerHTML = `<p class="error">${err.message}</p>`;
            }
        }

        function closeModal(modalId) {
            if (modalId) {
                setVisible(modalId, false);
            } else {
                setVisible('gameModal', false);
                setVisible('monetizeModal', false);
            }
        }

        // QOL Update: Close modals when clicking outside
        window.onclick = function(event) {
            const gameModal = $('gameModal');
            const monetizeModal = $('monetizeModal');
            if (event.target === gameModal) setVisible('gameModal', false);
            if (event.target === monetizeModal) setVisible('monetizeModal', false);
        };
    </script>
</body>
</html>
